<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Calculator — Study Metrics</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
</head>
<body>
<header class="site-head">
  <div class="wrap nav">
    <a href="index.html" class="logo">Study&nbsp;Metrics</a>
    <nav class="nav-links"><a href="index.html#tools">Tools</a><a href="grade-calculator.html" class="on">Grade Calc</a><a href="blog.html">Blog</a></nav>
    <div class="nav-cta"><button class="menu-toggle" id="menuToggle">Menu</button></div>
  </div>
</header>

<section class="tool-head">
  <div class="grid-bg"></div>
  <div class="wrap">
    <h1>Weighted Grade Calculator</h1>
    <p>Add assignments, quizzes and exams to see your overall course grade in real time.</p>
  </div>
</section>

<div class="wrap">
  <div class="tool-layout">
    <div class="calc-main">
      <div class="panel">
        <div class="panel-head"><h2>Your graded items</h2><button class="btn btn-ghost" id="addRow">Add item</button></div>
        <div class="rows-weight">
          <div class="rows-head"><span>Item</span><span>Score (%)</span><span>Weight (%)</span><span></span></div>
          <div id="rows"></div>
        </div>
        <div class="calc-actions">
          <button class="btn btn-primary" id="addRow2">Add another item</button>
        </div>
      </div>
    </div>
    <div class="result-rail">
      <div class="grade-hero">
        <div class="label">Current Grade</div>
        <div class="grade-big tnum" id="gradeOut">—</div>
        <div class="grade-letter" id="gradeLetter">—</div>
      </div>
      <div class="weight-note ok" id="weightNote"></div>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
<script src="js/grade-calculator.js"></script>
</body>
</html>
