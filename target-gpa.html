<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Target GPA Calculator — Study Metrics</title>
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-head">
  <div class="wrap nav">
    <a href="index.html" class="logo"><span class="logo-mark"><span class="logo-dot"></span></span>Study&nbsp;Metrics</a>
    <nav class="nav-links"><a href="index.html#tools">Tools</a><a href="target-gpa.html" class="on">Target GPA</a><a href="about.html">About</a><a href="blog.html">Blog</a></nav>
    <div class="nav-cta"><a href="index.html#tools" class="btn btn-ghost">All tools</a><button class="menu-toggle" id="menuToggle" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button></div>
  </div>
</header>
<section class="tool-head">
  <div class="grid-bg"></div>
  <div class="wrap">
    <div class="crumb"><a href="index.html">Home</a><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg><span>Target GPA Calculator</span></div>
    <h1>Target GPA Calculator</h1>
    <p>Know where you stand and where you want to be. Enter your current GPA and set a goal.</p>
  </div>
</section>
<div class="wrap">
  <div class="tool-layout wide-rail">
    <div class="calc-main">
      <div class="panel">
        <div class="inputs">
          <div class="pair">
            <div class="field"><label for="curGpa">Current GPA</label><input class="input lg tnum" id="curGpa" type="number" min="0" max="4" step="0.01" value="3.20"></div>
            <div class="field"><label for="curCredits">Credits completed</label><input class="input lg tnum" id="curCredits" type="number" min="0" step="1" value="60"></div>
          </div>
          <div class="pair">
            <div class="field"><label for="remCredits">Credits remaining</label><input class="input lg tnum" id="remCredits" type="number" min="1" step="1" value="60"></div>
            <div class="field"><label for="goalGpa">Goal GPA</label><input class="input lg tnum" id="goalGpa" type="number" min="0" max="4" step="0.01" value="3.50"></div>
          </div>
          <div class="field slider-wrap">
            <div class="slider-val"><label for="goalSlide">Slide your goal</label><b class="tnum" id="goalSlideVal">3.50</b></div>
            <input type="range" id="goalSlide" min="0" max="4" step="0.01" value="3.50">
          </div>
        </div>
      </div>
    </div>
    <div class="result-rail">
      <div class="res-hero"><div class="label">You need to average</div><div class="res-big tnum" id="need">—</div><div class="res-sub" id="needSub">across remaining credits</div></div>
      <div class="verdict info" id="verdict"><span id="verdictText"></span></div>
    </div>
  </div>
</div>
<footer class="foot">
  <div class="wrap"><div class="foot-bottom"><span>© 2026 Study Metrics. All rights reserved.</span></div></div>
</footer>
<script src="js/script.js"></script>
<script src="js/target-gpa.js"></script>
</body>
</html>
