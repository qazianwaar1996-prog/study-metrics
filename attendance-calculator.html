<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Calculator — Study Metrics</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-head">
  <div class="wrap nav">
    <a href="index.html" class="logo">Study&nbsp;Metrics</a>
    <nav class="nav-links"><a href="index.html#tools">Tools</a><a href="attendance-calculator.html" class="on">Attendance</a></nav>
    <div class="nav-cta"><button class="menu-toggle" id="menuToggle">Menu</button></div>
  </div>
</header>
<section class="tool-head">
  <div class="wrap">
    <h1>Attendance Calculator</h1>
    <p>Check your current percentage and see how many classes you can skip.</p>
  </div>
</section>
<div class="wrap">
  <div class="tool-layout wide-rail">
    <div class="calc-main">
      <div class="panel">
        <div class="inputs">
          <div class="pair">
            <div class="field"><label for="attended">Classes attended</label><input class="input lg tnum" id="attended" type="number" value="42"></div>
            <div class="field"><label for="held">Total classes held</label><input class="input lg tnum" id="held" type="number" value="50"></div>
          </div>
          <div class="field"><label for="req">Required attendance (%)</label><input class="input lg tnum" id="req" type="number" value="75"></div>
        </div>
      </div>
    </div>
    <div class="result-rail">
      <div class="ring-card">
        <div class="mid"><span class="pct tnum" id="pct">—</span><span class="lbl">current</span></div>
        <div class="ring-status" id="status">Enter numbers</div>
      </div>
      <div class="verdict ok" id="verdict"><span id="verdictText"></span></div>
    </div>
  </div>
</div>
<script src="js/script.js"></script>
<script src="js/attendance-calculator.js"></script>
</body>
</html>
